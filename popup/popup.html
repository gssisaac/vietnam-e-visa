<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vietnam e-Visa Autofill</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1>Vietnam e-Visa Autofill</h1>
    <p id="status" class="status">Checking page...</p>
    <label class="field" for="entryDate">
      <span class="field-label">Intended entry date</span>
      <input id="entryDate" class="field-input" type="date" required>
    </label>
    <p id="visaRange" class="visa-range hidden"></p>
    <button id="fillBtn" class="btn primary" disabled>Fill Form</button>
    <div id="result" class="result hidden"></div>
    <p class="hint">Edit <code>profile.yaml</code> in the extension folder, then reload the extension.</p>
  </div>
  <script src="popup.js"></script>
</body>
</html>
